        // Simulate scanning interaction
        const uploadArea = document.querySelector('.border-dashed');
        const cardPreview = document.getElementById('card-preview');

        if (uploadArea) {
            uploadArea.addEventListener('click', () => {
                uploadArea.classList.add('bg-secondary-container');
                // Adding a scan line visual effect
                const scanLine = document.createElement('div');
                scanLine.className = 'scanline';
                uploadArea.appendChild(scanLine);

                setTimeout(() => {
                    if (cardPreview) cardPreview.classList.remove('hidden');
                    scanLine.remove();
                }, 1200);
            });
        }

        // Basic button interaction for navigation icons
        document.querySelectorAll('nav button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('nav button').forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-2', 'border-on-surface', 'shadow-[4px_4px_0px_#000000]');

                });

                this.classList.remove('text-on-surface-variant');
            });
        });
