name: CI
on:
  pull_request:
  push:
    branches: [main, 'codex/**']
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cloudfunctions/api
      - run: npm ci --prefix cloudfunctions/processCardImage
      - run: npm ci --prefix cloudfunctions/scheduledCleanup
      - run: npm run verify
      - run: npm run security:check
